<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form>

        <h1>REGISTRAR</h1>

        <label for="login">Login</label>
        <input type="text" id="login" placeholder="Digite um Login">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite um Email">

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite uma Senha">

        <label for="confirmarSenha">Confimar senha</label>
        <input type="password" id="confirmarSenha" placeholder="Digite uma Senha ">

        <button type="button" id="button">Registrar-se</button>

        <a href="/sistemaLogin/frontend/login/index.html">Login</a>



    </form>

    <script src="registrar.js"></script>

</body>

</html>
